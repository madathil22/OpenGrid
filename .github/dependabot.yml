version: 2
# Security-only configuration — intentionally NO routine version-bump PRs.
#
# `open-pull-requests-limit: 0` disables scheduled version updates, so Dependabot
# will not open the steady stream of "bump X from 1.2.3 to 1.2.4" PRs. Dependabot
# *security* updates are unaffected by this limit and still open a PR when a real
# advisory affects a dependency (rare). Routine freshness is instead covered by
# the CI `pnpm audit --prod` job, which surfaces issues without creating PRs.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - security

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - security
