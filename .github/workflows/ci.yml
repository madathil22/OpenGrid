name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Test, Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so workspace packages expose their dist/*.d.ts type
      # declarations, which downstream packages (e.g. @opengrid/react) resolve
      # against during typecheck.
      - name: Build all packages
        run: pnpm build

      - name: Typecheck
        run: pnpm -r --filter='./packages/*' typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Check bundle sizes
        run: |
          echo "=== Bundle sizes ==="
          find packages/*/dist -name "*.js" -not -name "*.map" | while read f; do
            size=$(wc -c < "$f")
            echo "$f: ${size} bytes"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            packages/core/dist
            packages/react/dist
            packages/themes/dist
            packages/export/dist

  audit:
    name: Security audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Audit only what actually ships to consumers. Non-blocking for now so a
      # transitive advisory we can't immediately patch doesn't wall off merges;
      # flip continue-on-error to false once the prod tree is reliably clean.
      - name: pnpm audit (production)
        run: pnpm audit --prod --audit-level high
        continue-on-error: true

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The playground imports the built workspace packages, so build first.
      - name: Build packages
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @opengrid/playground exec playwright install --with-deps chromium

      - name: Run smoke tests
        run: pnpm --filter @opengrid/playground e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/playground/playwright-report/
          retention-days: 7
