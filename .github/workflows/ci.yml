name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Test, Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so workspace packages expose their dist/*.d.ts type
      # declarations, which downstream packages (e.g. @opengrid/react) resolve
      # against during typecheck.
      - name: Build all packages
        run: pnpm build

      - name: Typecheck
        run: pnpm -r --filter='./packages/*' typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

      - name: Check bundle sizes
        run: |
          echo "=== Bundle sizes ==="
          find packages/*/dist -name "*.js" -not -name "*.map" | while read f; do
            size=$(wc -c < "$f")
            echo "$f: ${size} bytes"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/core/dist
            packages/react/dist
            packages/themes/dist
            packages/export/dist
