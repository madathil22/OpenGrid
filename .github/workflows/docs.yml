name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/**/*.md'
      - '.github/workflows/docs.yml'
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; skip queued runs in favor of the latest
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The docs site imports @opengrid/react and @opengrid/themes from their
      # built dist/ output, so the workspace packages must be built first.
      - name: Build packages
        run: pnpm build

      - name: Build docs
        run: pnpm --filter @opengrid/docs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
